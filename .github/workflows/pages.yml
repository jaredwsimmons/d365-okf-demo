name: Publish OKF Demo Pages

# Emits the synthetic Contoso OKF bundle from data/ and publishes it to GitHub
# Pages. This demo is pure Node (no PowerShell extract), so it runs on
# ubuntu-latest. One-time setup: repo Settings -> Pages -> Source: GitHub Actions.
# Publishes to https://<owner>.github.io/<repo>/.

run-name: Publish OKF Demo Pages (${{ github.sha }})

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Emit OKF bundle + viewer
        env:
          DATA_DIR: data
        run: npm run okf:bundle

      - name: Prepare Pages bundle
        run: |
          cp okf-bundle/_viewer.html okf-bundle/index.html
          touch okf-bundle/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: okf-bundle

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
