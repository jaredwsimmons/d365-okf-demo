name: Publish OKF Demo (static app)

# Builds the OKF dashboard as a static export fed by the committed Contoso API
# snapshots (public/api-snapshot) and publishes it to GitHub Pages. Pure Node —
# no database, no server. One-time setup: repo Settings -> Pages -> Source:
# "GitHub Actions". Publishes to https://<owner>.github.io/d365-okf-demo/.

run-name: Publish OKF Demo (${{ github.sha }})

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Build static export (Contoso branding + Pages basePath)
        run: node scripts/static/build-static.mjs
        env:
          NEXT_PUBLIC_STATIC: '1'
          NEXT_PUBLIC_BASE_PATH: '/d365-okf-demo'
          NEXT_PUBLIC_CUSTOM_PREFIX: 'con_'
          NEXT_PUBLIC_CUSTOM_LABEL: 'Contoso'
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
